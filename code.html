<main class="min-h-[calc(100vh-64px-120px)] flex items-center justify-center py-xl px-md relative overflow-hidden">

<h1 class="font-headline-md text-headline-md text-on-surface mb-2">Bienvenido de nuevo</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Ingresa tus credenciales para continuar</p>
</div>
<form class="space-y-md" id="loginForm">
<!-- Email Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-secondary" for="email">Correo electrónico</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-10 pr-md py-3 bg-surface rounded-lg border border-outline-variant focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all font-body-md text-body-md" id="email" placeholder="nombre@ejemplo.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-secondary" for="password">Contraseña</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Olvidé mi contraseña</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface rounded-lg border border-outline-variant focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all font-body-md text-body-md" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors p-1" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-base">
<input class="w-4 h-4 text-primary bg-surface border-outline-variant rounded focus:ring-primary focus:ring-offset-0" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-secondary cursor-pointer" for="remember">Recordarme</label>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary py-3 rounded-lg font-label-md text-label-md font-bold uppercase tracking-wider animate-subtle-scale hover:opacity-95 transition-all shadow-md flex items-center justify-center gap-2" type="submit">
                    Iniciar sesión
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>

<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        // Form submission micro-interaction
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Validando...`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Bienvenido`;
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-tertiary-container', 'bg-primary');
                }, 2000);
            }, 1500);
        });
    </script>
